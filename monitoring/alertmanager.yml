global:
  resolve_timeout: 1m

route:
  receiver: agentic-workflow-webhook
  group_by:
    - alertname
    - service
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 5m

receivers:
  - name: agentic-workflow-webhook
    webhook_configs:
      - url: http://incident-agent-workflow:9100/alerts
        send_resolved: true
