server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          service: weather-app1
          env: local-docker
          __path__: /var/log/apps/weather-app1/*.log
      - targets:
          - localhost
        labels:
          job: app-logs
          service: mongo-api-service
          env: local-docker
          __path__: /var/log/apps/mongo-api-service/*.log
      - targets:
          - localhost
        labels:
          job: app-logs
          service: incident-agent-workflow
          env: local-docker
          __path__: /var/log/apps/incident-agent-workflow/*.log
