global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: local-services
    file_sd_configs:
      - files:
          - /etc/prometheus/targets.yml
        refresh_interval: 5s
